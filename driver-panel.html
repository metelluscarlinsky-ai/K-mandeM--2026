<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panèl Livrè - KòmandeM</title>
    <style>
        :root{--brand:#FF6B35;--dark:#0A0A1A;--card:#1E293B;--border:rgba(255,255,255,0.06);--text:#E2E8F0;--muted:#94A3B8;--success:#22C55E;--danger:#EF4444;--radius:14px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--dark);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
        .topbar{background:var(--card);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
        .topbar h1{font-size:1.2rem}.topbar h1 span{color:var(--brand)}
        .btn{padding:0.6rem 1.2rem;border-radius:var(--radius);font-weight:600;cursor:pointer;border:none;font-family:inherit}
        .btn-primary{background:var(--brand);color:white}.btn-success{background:rgba(34,197,94,0.1);color:var(--success);border:1px solid rgba(34,197,94,0.2)}
        .btn-danger{background:rgba(239,68,68,0.1);color:var(--danger)}
        .btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.1);color:white}
        .container{max-width:800px;margin:0 auto;padding:1.5rem}
        
        .status-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.5rem;text-align:center;margin-bottom:1.5rem}
        .pulse{width:14px;height:14px;background:var(--success);border-radius:50%;display:inline-block;animation:pulse 1.5s infinite;margin-right:0.5rem}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.4)}70%{box-shadow:0 0 0 15px rgba(34,197,94,0)}}
        
        .toggle-row{display:flex;align-items:center;gap:1rem;justify-content:center;margin-top:1rem}
        .toggle{position:relative;width:52px;height:28px}
        .toggle input{opacity:0;width:0;height:0}
        .toggle .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.1);transition:0.3s;border-radius:28px}
        .toggle .slider:before{position:absolute;content:"";height:22px;width:22px;left:3px;bottom:3px;background:white;transition:0.3s;border-radius:50%}
        .toggle input:checked+.slider{background:var(--success)}
        .toggle input:checked+.slider:before{transform:translateX(24px)}
        
        .card{background:var(--card);border:1px solid var(--border);border-radius:20px;margin-bottom:1rem}
        .card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);font-weight:700;display:flex;align-items:center;gap:0.5rem}
        .card-body{padding:1.25rem}
        
        .map-box{height:250px;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.1);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;text-align:center;margin-bottom:1rem}
        .map-box.active{border-color:var(--success);border-style:solid}
        .loc-dot{width:16px;height:16px;background:var(--brand);border:3px solid white;border-radius:50%;display:inline-block;animation:pulse 2s infinite;margin-bottom:0.5rem}
        
        .loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:1rem}
        .loc-item{background:rgba(255,255,255,0.02);border-radius:var(--radius);padding:0.75rem;text-align:center}
        .loc-item strong{display:block;font-size:1.1rem}.loc-item small{color:var(--muted);font-size:0.75rem}
        
        .order-item{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:var(--radius);padding:1rem;margin-bottom:0.75rem}
        .order-item h4{color:white;margin-bottom:0.25rem}
        .order-item p{color:var(--muted);font-size:0.85rem}
        .order-actions{display:flex;gap:0.5rem;margin-top:0.75rem}
        
        .badge{display:inline-flex;padding:0.2rem 0.6rem;border-radius:999px;font-size:0.7rem;font-weight:600}
        .badge-brand{background:rgba(255,107,53,0.1);color:var(--brand)}
        .badge-success{background:rgba(34,197,94,0.1);color:var(--success)}
        
        .empty{text-align:center;padding:3rem;color:var(--muted)}
    </style>
</head>
<body>

<div class="topbar">
    <h1>🏍️ <span id="dName">Livrè</span></h1>
    <div style="display:flex;gap:0.5rem;align-items:center">
        <span id="statusDot">🟢</span>
        <span id="statusText">Disponib</span>
        <button class="btn btn-danger btn-sm" onclick="logout()">Dekonekte</button>
    </div>
</div>

<div class="container">
    <div class="status-card">
        <h2><span class="pulse"></span>Estat Livrè</h2>
        <p style="color:var(--muted)">Aktive w pou resevwa kòmand</p>
        <div class="toggle-row">
            <span>🛑 Offline</span>
            <label class="toggle"><input type="checkbox" id="activeToggle" onchange="toggleActive()" checked><span class="slider"></span></label>
            <span>🟢 Online</span>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><i class="fas fa-map-marker-alt" style="color:var(--brand)"></i>Lokalisasyon GPS Reyèl</div>
        <div class="card-body">
            <div class="map-box" id="mapBox"><div><div class="loc-dot"></div><p style="color:var(--muted)">Chèche pozisyon GPS...</p></div></div>
            <div class="loc-grid" id="locInfo" style="display:none">
                <div class="loc-item"><small>Latitid</small><strong id="latVal">--</strong></div>
                <div class="loc-item"><small>Lonjitid</small><strong id="lngVal">--</strong></div>
                <div class="loc-item"><small>Presizyon</small><strong id="accVal">--</strong></div>
                <div class="loc-item"><small>Update</small><strong id="timeVal">--</strong></div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="getLocation()" style="margin-top:0.75rem"><i class="fas fa-satellite"></i>Aktive GPS</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><i class="fas fa-box" style="color:var(--brand)"></i>Livrezon Jodi a</div>
        <div class="card-body" id="deliveryList"><div class="empty"><i class="fas fa-inbox" style="font-size:3rem;display:block;opacity:0.3;margin-bottom:1rem"></i><p>Pa gen livrezon</p></div></div>
    </div>
</div>

<script>
var session=JSON.parse(localStorage.getItem('komandem-admin-session')||'null');
if(!session||session.expires<Date.now()||(session.user.role!=='driver'&&session.user.role!=='superadmin')){window.location.href='admin-login.html'}
var driverId=session.user.driverId||session.user.id;
document.getElementById('dName').textContent=session.user.non||'Livrè';

function fm(m){return(m||0).toLocaleString('ht-HT')+' GDS'}
function go(){return JSON.parse(localStorage.getItem('komandem-orders')||'[]')}
function so(d){localStorage.setItem('komandem-orders',JSON.stringify(d))}

function toggleActive(){
    var a=document.getElementById('activeToggle').checked;
    document.getElementById('statusDot').textContent=a?'🟢':'🔴';
    document.getElementById('statusText').textContent=a?'Disponib':'Nan Repo';
    var d=JSON.parse(localStorage.getItem('komandem-drivers')||'[]');
    var dr=d.find(function(x){return x.id===driverId});
    if(dr){dr.estat=a?'disponib':'nan_repo';localStorage.setItem('komandem-drivers',JSON.stringify(d))}
}

var watchId=null;
function getLocation(){
    if(!navigator.geolocation){alert('GPS pa sipòte');return}
    document.getElementById('mapBox').innerHTML='<div><div class="loc-dot"></div><p style="color:var(--brand)">Ap chèche satelit...</p></div>';
    
    navigator.geolocation.getCurrentPosition(function(pos){
        document.getElementById('mapBox').classList.add('active');
        document.getElementById('mapBox').innerHTML='<div><div class="loc-dot"></div><p style="color:var(--success);font-weight:600">✅ GPS Aktive!</p><p style="color:var(--muted);font-size:0.8rem">W ap vizib sou kat pou admin</p></div>';
        document.getElementById('locInfo').style.display='grid';
        document.getElementById('latVal').textContent=pos.coords.latitude.toFixed(6);
        document.getElementById('lngVal').textContent=pos.coords.longitude.toFixed(6);
        document.getElementById('accVal').textContent=Math.round(pos.coords.accuracy)+'m';
        document.getElementById('timeVal').textContent=new Date().toLocaleTimeString('ht-HT');
        localStorage.setItem('komandem-driver-location-'+driverId,JSON.stringify({lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy,timestamp:new Date().toISOString(),driverId:driverId}));
        
        if(watchId)navigator.geolocation.clearWatch(watchId);
        watchId=navigator.geolocation.watchPosition(function(p){
            localStorage.setItem('komandem-driver-location-'+driverId,JSON.stringify({lat:p.coords.latitude,lng:p.coords.longitude,accuracy:p.coords.accuracy,timestamp:new Date().toISOString(),driverId:driverId}));
            document.getElementById('latVal').textContent=p.coords.latitude.toFixed(6);
            document.getElementById('lngVal').textContent=p.coords.longitude.toFixed(6);
            document.getElementById('timeVal').textContent=new Date().toLocaleTimeString('ht-HT');
        });
    },function(err){
        var msg='Pa ka jwenn GPS';
        if(err.code===1)msg='Pèmisyon refize! Aktive GPS nan paramèt';
        else if(err.code===2)msg='Siyal pa disponib. Ale deyò';
        document.getElementById('mapBox').innerHTML='<div><p style="color:var(--danger)">❌ '+msg+'</p><button class="btn btn-primary btn-sm" onclick="getLocation()" style="margin-top:0.5rem">Eseye Ankò</button></div>';
    },{enableHighAccuracy:true,timeout:30000,maximumAge:0});
}

function loadDeliveries(){
    var orders=go();var today=new Date().toDateString();
    var my=orders.filter(function(o){return o.livrè_id===driverId&&o.dat&&new Date(o.dat).toDateString()===today});
    if(!my.length){my=orders.filter(function(o){return(o.estat==='prè'||o.estat==='an_wout')&&!o.livrè_id})}
    if(!my.length){document.getElementById('deliveryList').innerHTML='<div class="empty"><i class="fas fa-inbox" style="font-size:3rem;display:block;opacity:0.3;margin-bottom:1rem"></i><p>Pa gen livrezon</p></div>';return}
    document.getElementById('deliveryList').innerHTML=my.map(function(o){
        return'<div class="order-item"><h4>🚚 '+(o.id||'KMD')+'</h4><p>👤 '+(o.kliyan||'N/A')+' | 📞 '+(o.kliyan_tel||'N/A')+'</p><p>📍 '+(o.adrès_livrezon?.ri||'Gonayiv')+'</p><p>📦 '+((o.atik||[]).map(function(a){return a.kantite+'x '+a.non}).join(', '))+'</p><p>💰 '+fm(o.total)+'</p><div class="order-actions"><button class="btn btn-success btn-sm" onclick="accept(\''+o.id+'\')">Aksepte</button><button class="btn btn-outline btn-sm" onclick="deliver(\''+o.id+'\')">Livre</button><button class="btn btn-outline btn-sm" onclick="openMap(\''+(o.adrès_livrezon?.ri||'Gonayiv')+'\')">🗺️Kat</button></div></div>';
    }).join('');
}
function accept(id){var o=go();var i=o.findIndex(function(x){return x.id===id});if(i>=0){o[i].estat='an_wout';o[i].livrè_id=driverId;so(o);loadDeliveries();alert('✅ Aksepte!')}}
function deliver(id){if(confirm('Livre?')){var o=go();var i=o.findIndex(function(x){return x.id===id});if(i>=0){o[i].estat='livre';o[i].dat_livrezon=new Date().toISOString();so(o);loadDeliveries();alert('✅ Livre!')}}}
function openMap(a){window.open('https://www.google.com/maps?q='+encodeURIComponent(a+' Gonayiv'),'_blank')}
function logout(){if(watchId)navigator.geolocation.clearWatch(watchId);localStorage.removeItem('komandem-admin-session');window.location.href='admin-login.html'}

getLocation();loadDeliveries();setInterval(loadDeliveries,30000);
</script>
</body>
</html>
