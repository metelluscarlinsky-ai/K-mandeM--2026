<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panèl Machann - KòmandeM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{--brand:#FF6B35;--dark:#0A0A1A;--card:#1E293B;--border:rgba(255,255,255,0.06);--text:#E2E8F0;--text-muted:#94A3B8;--success:#22C55E;--danger:#EF4444;--warning:#F59E0B;--radius:12px;--radius-lg:20px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--dark);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
        
        .topbar{background:var(--card);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:1rem}
        .topbar h1{font-size:1.2rem;font-weight:800;color:white}.topbar h1 span{color:var(--brand)}
        
        .btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.6rem 1.2rem;border-radius:var(--radius);font-weight:600;font-size:0.85rem;cursor:pointer;border:none;font-family:inherit;transition:all 0.2s}
        .btn-primary{background:var(--brand);color:white}.btn-primary:hover{background:#E55A2B}
        .btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.1);color:white}
        .btn-danger{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:var(--danger)}
        .btn-sm{padding:0.35rem 0.75rem;font-size:0.8rem}
        
        .container{padding:1.5rem;max-width:900px;margin:0 auto}
        
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2rem}
        .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;text-align:center}
        .stat-card .value{font-size:1.75rem;font-weight:800;color:white}
        .stat-card .label{font-size:0.8rem;color:var(--text-muted)}
        
        .tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem}
        .tab{padding:0.7rem 1.5rem;border-radius:var(--radius);cursor:pointer;font-weight:600;font-size:0.9rem;background:rgba(255,255,255,0.03);color:var(--text-muted);border:none;font-family:inherit}
        .tab.active{background:var(--brand);color:white}
        
        .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1.5rem;overflow:hidden}
        .card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .card-header h3{font-size:1rem;font-weight:700;color:white}
        .card-body{padding:1.25rem}
        
        .table-wrap{overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        th{padding:0.75rem;text-align:left;font-size:0.72rem;font-weight:700;color:#64748B;text-transform:uppercase;border-bottom:1px solid var(--border)}
        td{padding:0.75rem;font-size:0.85rem;border-bottom:1px solid var(--border)}
        
        .badge{display:inline-flex;padding:0.2rem 0.6rem;border-radius:999px;font-size:0.7rem;font-weight:600}
        .badge-success{background:rgba(34,197,94,0.1);color:var(--success)}
        .badge-brand{background:rgba(255,107,53,0.1);color:var(--brand)}
        .badge-warning{background:rgba(245,158,11,0.1);color:var(--warning)}
        .badge-gray{background:rgba(148,163,184,0.1);color:var(--text-muted)}
        
        .form-group{margin-bottom:0.75rem}
        .form-group label{display:block;font-weight:600;font-size:0.8rem;color:var(--text);margin-bottom:0.35rem}
        .form-input{width:100%;padding:0.65rem 0.85rem;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius);color:white;font-size:0.9rem;outline:none;font-family:inherit;box-sizing:border-box}
        .form-input:focus{border-color:var(--brand)}
        select.form-input{cursor:pointer}
        select.form-input option{background:var(--card);color:white}
        textarea.form-input{resize:vertical;min-height:50px}
        
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem}
        .modal.show{display:flex}
        .modal-content{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
        .modal-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .modal-header h3{color:white;font-size:1rem}
        .modal-close{background:none;border:none;color:#64748B;font-size:1.5rem;cursor:pointer}
        .modal-body{padding:1.25rem}
        .modal-footer{padding:1rem 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:0.75rem}
        
        .page{display:none}.page.active{display:block}
        .notif-item{padding:0.75rem;border-bottom:1px solid var(--border)}
        .notif-item.new{border-left:3px solid var(--brand)}
        
        @media(max-width:600px){.topbar{padding:1rem}.container{padding:1rem}.stats{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>

<div class="topbar">
    <h1>🏪 <span id="mName">Machann</span></h1>
    <div style="display:flex;gap:0.5rem;align-items:center">
        <span id="notifDot" style="display:none;color:var(--warning)">🔔</span>
        <button class="btn btn-danger btn-sm" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Dekonekte</button>
    </div>
</div>

<div class="container">
    
    <div class="stats">
        <div class="stat-card"><div class="value" id="ms1">0</div><div class="label">Pwodui</div></div>
        <div class="stat-card"><div class="value" id="ms2">0</div><div class="label">Kòmand An Atant</div></div>
        <div class="stat-card"><div class="value" id="ms3">0 GDS</div><div class="label">Revni Jodi a</div></div>
        <div class="stat-card"><div class="value" id="ms4">0 GDS</div><div class="label">Balans</div></div>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="showTab('products')">📦 Pwodui</button>
        <button class="tab" onclick="showTab('orders')">🛒 Kòmand</button>
        <button class="tab" onclick="showTab('notifications')">🔔 Notifikasyon</button>
    </div>
    
    <!-- PRODUCTS -->
    <div class="page active" id="pageProducts">
        <div class="card">
            <div class="card-header"><h3>Pwodui mwen yo</h3><button class="btn btn-primary btn-sm" onclick="openForm()">+ Ajoute</button></div>
            <div class="table-wrap"><table><thead><tr><th>Non</th><th>Kategori</th><th>Pri</th><th>Tan</th><th>Dispo</th><th>Aksyon</th></tr></thead><tbody id="prodBody"></tbody></table></div>
        </div>
    </div>
    
    <!-- ORDERS -->
    <div class="page" id="pageOrders">
        <div class="card">
            <div class="card-header"><h3>Kòmand mwen yo</h3></div>
            <div class="table-wrap"><table><thead><tr><th>Nimewo</th><th>Kliyan</th><th>Atik</th><th>Total</th><th>Estat</th></tr></thead><tbody id="ordBody"></tbody></table></div>
        </div>
    </div>
    
    <!-- NOTIFICATIONS -->
    <div class="page" id="pageNotifications">
        <div class="card">
            <div class="card-header"><h3>Dènye Notifikasyon</h3></div>
            <div class="card-body" id="notifBody"></div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal" id="prodModal">
    <div class="modal-content">
        <div class="modal-header"><h3 id="modalTitle">Ajoute Pwodui</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
        <form onsubmit="saveProduct(event)" class="modal-body">
            <input type="hidden" id="prodId">
            <div class="form-group"><label>Non *</label><input type="text" id="prodNom" class="form-input" required></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
                <div class="form-group"><label>Kategori *</label><select id="prodCat" class="form-input"><option value="dejene">🌅 Dejene</option><option value="dine">☀️ Dine</option><option value="soupe">🌙 Soupe</option><option value="desè">🍰 Desè</option><option value="bwason">🥤 Bwason</option><option value="glase">🍦 Glase</option></select></div>
                <div class="form-group"><label>Tan (min)</label><input type="number" id="prodTan" class="form-input" value="15" required></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
                <div class="form-group"><label>Pri (GDS) *</label><input type="number" id="prodPri" class="form-input" required></div>
                <div class="form-group"><label>Pri Originèl</label><input type="number" id="prodPrio" class="form-input"></div>
            </div>
            <div class="form-group"><label>Deskripsyon</label><textarea id="prodDesc" class="form-input" rows="2"></textarea></div>
            <div class="form-group"><label>Engredyan (vigil)</label><input type="text" id="prodIngr" class="form-input" placeholder="Pen, Ze, Lèt"></div>
            <div class="form-group"><label><input type="checkbox" id="prodDisp" checked> Disponib</label></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeModal()">Anile</button>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Anrejistre</button>
            </div>
        </form>
    </div>
</div>

<script>
var session=JSON.parse(localStorage.getItem('komandem-admin-session')||'null');
if(!session||session.expires<Date.now()||(session.user.role!=='merchant'&&session.user.role!=='superadmin')){localStorage.removeItem('komandem-admin-session');window.location.href='login.html'}

var merchantId=session.user.merchantId||session.user.id;
var merchantName=session.user.non||'Machann';
document.getElementById('mName').textContent=merchantName;

function fm(m){return(m||0).toLocaleString('ht-HT')+' GDS'}
function gp(){return JSON.parse(localStorage.getItem('komandem-products')||'[]')}
function sp(d){localStorage.setItem('komandem-products',JSON.stringify(d))}
function go(){return JSON.parse(localStorage.getItem('komandem-orders')||'[]')}
function getMyProducts(){return gp().filter(function(p){return p.machann_id===merchantId})}
function getMyOrders(){return go().filter(function(o){return o.machann_id===merchantId||o.machann===merchantName})}

function showTab(tab){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
    event.target.classList.add('active');
    document.getElementById('page'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
    if(tab==='products')renderProducts();
    if(tab==='orders')renderOrders();
    if(tab==='notifications')renderNotifications();
}

function loadStats(){
    var p=getMyProducts(),o=getMyOrders();
    var today=new Date().toDateString();
    var to=o.filter(function(x){return x.dat&&new Date(x.dat).toDateString()===today});
    document.getElementById('ms1').textContent=p.length;
    document.getElementById('ms2').textContent=o.filter(function(x){return x.estat==='ann_atant'}).length;
    document.getElementById('ms3').textContent=fm(to.reduce(function(a,x){return a+(x.total||0)},0));
    var merchants=JSON.parse(localStorage.getItem('komandem-merchants')||'[]');
    var me=merchants.find(function(m){return m.id===merchantId});
    document.getElementById('ms4').textContent=fm(me?me.balans||0:0);
    
    var pending=o.filter(function(x){return x.estat==='ann_atant'}).length;
    document.getElementById('notifDot').style.display=pending>0?'inline':'none';
}
loadStats();

function renderProducts(){
    var p=getMyProducts();
    document.getElementById('prodBody').innerHTML=p.length?p.map(function(pr){
        var hasDiscount=pr.pri_originèl&&pr.pri_originèl>pr.pri;
        return'<tr><td><strong>'+pr.non+'</strong></td><td><span class="badge badge-brand">'+(pr.kategori||'-')+'</span></td><td>'+fm(pr.pri)+(hasDiscount?' <span style="text-decoration:line-through;color:var(--text-muted);font-size:0.75rem">'+fm(pr.pri_originèl)+'</span>':'')+'</td><td>'+(pr.tan_preparasyon||15)+' min</td><td><span class="badge '+(pr.disponib!==false?'badge-success':'badge-gray')+'">'+(pr.disponib!==false?'Wi':'Non')+'</span></td><td><button class="btn btn-outline btn-sm" onclick="editProduct(\''+pr.id+'\')"><i class="fas fa-edit"></i></button> <button class="btn btn-danger btn-sm" onclick="deleteProduct(\''+pr.id+'\')"><i class="fas fa-trash"></i></button></td></tr>';
    }).join(''):'<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted)">Pa gen pwodui. Klike "+ Ajoute".</td></tr>';
}
renderProducts();

function openForm(id){
    document.getElementById('prodModal').classList.add('show');
    document.getElementById('modalTitle').textContent=id?'Modifye Pwodui':'Ajoute Pwodui';
    if(id){
        var p=getMyProducts().find(function(x){return x.id===id});
        if(p){
            document.getElementById('prodId').value=p.id;
            document.getElementById('prodNom').value=p.non||'';
            document.getElementById('prodCat').value=p.kategori||'';
            document.getElementById('prodTan').value=p.tan_preparasyon||15;
            document.getElementById('prodPri').value=p.pri||0;
            document.getElementById('prodPrio').value=p.pri_originèl||'';
            document.getElementById('prodDesc').value=p.deskripsyon||'';
            document.getElementById('prodIngr').value=(p.engredyan||[]).join(', ');
            document.getElementById('prodDisp').checked=p.disponib!==false;
        }
    }else{
        document.querySelector('#prodModal form').reset();
        document.getElementById('prodId').value='';
        document.getElementById('prodTan').value=15;
        document.getElementById('prodDisp').checked=true;
    }
}

function closeModal(){document.getElementById('prodModal').classList.remove('show')}

function saveProduct(e){
    e.preventDefault();
    var id=document.getElementById('prodId').value;
    var pr={
        id:id||'prod_'+Date.now(),
        non:document.getElementById('prodNom').value,
        kategori:document.getElementById('prodCat').value,
        machann_id:merchantId,
        machann_non:merchantName,
        pri:parseInt(document.getElementById('prodPri').value),
        pri_originèl:document.getElementById('prodPrio').value?parseInt(document.getElementById('prodPrio').value):null,
        tan_preparasyon:parseInt(document.getElementById('prodTan').value),
        deskripsyon:document.getElementById('prodDesc').value,
        engredyan:document.getElementById('prodIngr').value.split(',').map(function(x){return x.trim()}).filter(function(x){return x}),
        disponib:document.getElementById('prodDisp').checked,
        imaj:'',evalyasyon:0,total_vant:0
    };
    var all=gp();
    if(id){var i=all.findIndex(function(x){return x.id===id});if(i>=0)all[i]=Object.assign(all[i],pr)}
    else{all.push(pr)}
    sp(all);closeModal();renderProducts();loadStats();
    alert('✅ Pwodui anrejistre!');
}

function editProduct(id){openForm(id)}
function deleteProduct(id){if(confirm('Retire?')){sp(gp().filter(function(x){return x.id!==id}));renderProducts();loadStats()}}

function renderOrders(){
    var o=getMyOrders();
    var labels={ann_atent:'An Atant',konfime:'Konfime',an_preparasyon:'An Preparasyon',prè:'Prè',an_wout:'An Wout',livre:'Livre',anile:'Anile'};
    var colors={ann_atent:'badge-warning',konfime:'badge-brand',an_preparasyon:'badge-brand',prè:'badge-success',an_wout:'badge-brand',livre:'badge-success',anile:'badge-gray'};
    document.getElementById('ordBody').innerHTML=o.length?o.map(function(ord){
        return'<tr><td><strong style="color:var(--brand)">'+(ord.id||'KMD')+'</strong></td><td>'+(ord.kliyan||'-')+'</td><td>'+((ord.atik||[]).map(function(a){return a.kantite+'x '+a.non}).join(', ')||'-')+'</td><td>'+fm(ord.total)+'</td><td><span class="badge '+(colors[ord.estat]||'badge-warning')+'">'+(labels[ord.estat]||ord.estat)+'</span></td></tr>';
    }).join(''):'<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted)">Pa gen kòmand ankò</td></tr>';
}

function renderNotifications(){
    var notifs=JSON.parse(localStorage.getItem('komandem-notifications')||'[]');
    var myNotifs=notifs.filter(function(n){return n.type==='machann'&&n.machann_id===merchantId});
    document.getElementById('notifBody').innerHTML=myNotifs.length?myNotifs.map(function(n){
        var time=new Date(n.time).toLocaleString('ht-HT');
        return'<div class="notif-item '+(n.read?'':'new')+'"><div>'+(n.read?'':'🔵 ')+n.message+'<br><small style="color:var(--text-muted)">'+time+'</small></div></div>';
    }).join(''):'<p style="text-align:center;color:var(--text-muted);padding:2rem">Pa gen notifikasyon</p>';
}

function logout(){localStorage.removeItem('komandem-admin-session');window.location.href='login.html'}

setInterval(function(){
    loadStats();
},15000);
</script>
</body>
</html>
