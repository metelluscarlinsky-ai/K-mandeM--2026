<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panèl Machann Pro - KòmandeM 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{--brand:#FF6B35;--dark:#0A0A1A;--card:#1E293B;--border:rgba(255,255,255,0.06);--text:#E2E8F0;--muted:#94A3B8;--success:#22C55E;--danger:#EF4444;--warning:#F59E0B;--info:#3B82F6;--radius:14px;--radius-lg:20px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--dark);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
        
        .topbar{background:var(--card);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:1rem}
        .topbar h1{font-size:1.3rem;font-weight:800}.topbar h1 span{color:var(--brand)}
        
        .btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.65rem 1.3rem;border-radius:var(--radius);font-weight:600;font-size:0.85rem;cursor:pointer;border:none;font-family:inherit;transition:all 0.2s}
        .btn-primary{background:var(--brand);color:white}.btn-primary:hover{background:#E55A2B;transform:translateY(-1px)}
        .btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.1);color:white}
        .btn-danger{background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.2)}
        .btn-success{background:rgba(34,197,94,0.1);color:var(--success);border:1px solid rgba(34,197,94,0.2)}
        .btn-sm{padding:0.35rem 0.8rem;font-size:0.78rem}
        
        .container{max-width:1100px;margin:0 auto;padding:1.5rem}
        
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
        .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;cursor:pointer;transition:all 0.3s}
        .stat-card:hover{border-color:var(--brand);transform:translateY(-2px)}
        .stat-icon{font-size:1.8rem;margin-bottom:0.75rem}.stat-value{font-size:2rem;font-weight:800}.stat-label{font-size:0.8rem;color:var(--muted)}
        
        .tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
        .tab{padding:0.7rem 1.5rem;border-radius:var(--radius);cursor:pointer;font-weight:600;font-size:0.9rem;background:rgba(255,255,255,0.03);color:var(--muted);border:none;font-family:inherit;transition:all 0.3s}
        .tab:hover{background:rgba(255,255,255,0.06);color:white}
        .tab.active{background:var(--brand);color:white;box-shadow:0 4px 15px rgba(255,107,53,0.3)}
        
        .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1.5rem;overflow:hidden}
        .card-header{padding:1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .card-header h3{font-size:1rem;font-weight:700}.card-body{padding:1.25rem}
        
        .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1.25rem}
        .product-card{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:all 0.3s}
        .product-card:hover{border-color:var(--brand);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
        .product-img{height:160px;background:rgba(255,107,53,0.05);display:flex;align-items:center;justify-content:center;font-size:3rem;overflow:hidden}
        .product-img img{width:100%;height:100%;object-fit:cover}
        .product-info{padding:1rem}.product-info h4{font-size:0.95rem;margin-bottom:0.25rem}
        .product-info .price{font-size:1.1rem;font-weight:700;color:var(--brand)}
        .product-info .meta{font-size:0.78rem;color:var(--muted);margin-top:0.35rem}
        .product-info .actions{margin-top:0.75rem;display:flex;gap:0.5rem}
        
        .badge{display:inline-flex;padding:0.2rem 0.7rem;border-radius:999px;font-size:0.7rem;font-weight:600}
        .badge-success{background:rgba(34,197,94,0.1);color:var(--success)}
        .badge-warning{background:rgba(245,158,11,0.1);color:var(--warning)}
        .badge-brand{background:rgba(255,107,53,0.1);color:var(--brand)}
        .badge-info{background:rgba(59,130,246,0.1);color:var(--info)}
        .badge-purple{background:rgba(168,85,247,0.1);color:#A855F7}
        
        table{width:100%;border-collapse:collapse}
        th{padding:0.75rem;text-align:left;font-size:0.7rem;font-weight:700;color:#64748B;text-transform:uppercase;border-bottom:1px solid var(--border)}
        td{padding:0.75rem;font-size:0.85rem;border-bottom:1px solid var(--border)}
        
        .form-group{margin-bottom:0.85rem}.form-group label{display:block;font-weight:600;font-size:0.8rem;color:var(--text);margin-bottom:0.35rem}
        .form-input{width:100%;padding:0.7rem 0.9rem;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius);color:white;font-size:0.9rem;outline:none;font-family:inherit;box-sizing:border-box;transition:all 0.3s}
        .form-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(255,107,53,0.1)}
        textarea.form-input{resize:vertical;min-height:60px}
        select.form-input{cursor:pointer}
        select.form-input option{background:var(--card);color:white}
        
        .image-upload-box{background:rgba(255,255,255,0.02);border:2px dashed var(--border);border-radius:var(--radius);padding:2rem;text-align:center;cursor:pointer;transition:all 0.3s;margin-bottom:0.75rem}
        .image-upload-box:hover{border-color:var(--brand);background:rgba(255,107,53,0.03)}
        .image-upload-box i{font-size:2rem;color:var(--muted);display:block;margin-bottom:0.5rem}
        .image-preview{max-width:100%;max-height:200px;border-radius:var(--radius);margin-top:0.5rem}
        
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
        .modal.show{display:flex}
        .modal-content{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:600px;max-height:85vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,0.5)}
        .modal-header{padding:1.25rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .modal-header h3{font-size:1.1rem}.modal-close{background:none;border:none;color:#64748B;font-size:1.5rem;cursor:pointer}
        .modal-body{padding:1.25rem}.modal-footer{padding:1rem 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:0.75rem}
        
        .page{display:none}.page.active{display:block}
        .notif-item{padding:0.85rem;border-bottom:1px solid var(--border)}.notif-item.new{border-left:3px solid var(--brand);background:rgba(255,107,53,0.02)}
        
        .toast-notification{position:fixed;top:20px;right:-400px;color:white;padding:1rem 1.5rem;border-radius:20px;font-weight:600;font-size:0.9rem;z-index:9999;box-shadow:0 20px 60px rgba(0,0,0,0.5);max-width:380px;font-family:system-ui,sans-serif;cursor:pointer;transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2)}
        
        .order-notif{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;animation:slideDown 0.5s ease;cursor:pointer;max-width:420px;width:90%}
        @keyframes slideDown{from{transform:translateX(-50%) translateY(-100px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
        
        @media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr)}.topbar{padding:1rem}.container{padding:1rem}}
    </style>
</head>
<body>

<div class="topbar">
    <h1>🏪 <span id="mName">Machann</span></h1>
    <div style="display:flex;gap:0.5rem;align-items:center">
        <span id="notifDot" style="display:none;font-size:1.5rem">🔔</span>
        <button class="btn btn-danger btn-sm" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Dekonekte</button>
    </div>
</div>

<div class="container">
    
    <div class="stats-grid">
        <div class="stat-card" onclick="showTab('products')"><div class="stat-icon">📦</div><div class="stat-value" id="s1">0</div><div class="stat-label">Pwodui</div></div>
        <div class="stat-card" onclick="showTab('orders')"><div class="stat-icon">🛒</div><div class="stat-value" id="s2" style="color:var(--warning)">0</div><div class="stat-label">An Atant</div></div>
        <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value" id="s3" style="color:var(--success)">0 GDS</div><div class="stat-label">Revni Jodi a</div></div>
        <div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-value" id="s4" style="color:var(--info)">0 GDS</div><div class="stat-label">Balans</div></div>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="showTab('products')">📦 Pwodui</button>
        <button class="tab" onclick="showTab('orders')">🛒 Kòmand</button>
        <button class="tab" onclick="showTab('notifications')">🔔 Notifikasyon</button>
        <button class="tab" onclick="showTab('settings')">⚙️ Paramèt</button>
    </div>
    
    <div class="page active" id="pageProducts">
        <div class="card"><div class="card-header"><h3>Katalòg Pwodui</h3><button class="btn btn-primary" onclick="openForm()"><i class="fas fa-plus"></i>Nouvo Pwodui</button></div>
        <div class="card-body"><div class="product-grid" id="prodGrid"></div><p id="prodEmpty" style="display:none;text-align:center;color:var(--muted);padding:2rem">Pa gen pwodui</p></div></div>
    </div>
    
    <div class="page" id="pageOrders">
        <div class="card"><div class="card-header"><h3>Kòmand Kliyan yo</h3></div>
        <div class="card-body"><div class="table-wrap"><table><thead><tr><th>Nimewo</th><th>Kliyan</th><th>Atik</th><th>Total</th><th>Estat</th><th>Aksyon</th></tr></thead><tbody id="ordBody"></tbody></table></div></div></div>
    </div>
    
    <div class="page" id="pageNotifications">
        <div class="card"><div class="card-header"><h3>Sant Notifikasyon</h3></div><div class="card-body" id="notifBody"></div></div>
    </div>
    
    <div class="page" id="pageSettings">
        <div class="card"><div class="card-header"><h3>Paramèt Boutik</h3></div>
        <div class="card-body">
            <div class="form-group"><label>Non Boutik</label><input type="text" id="setName" class="form-input"></div>
            <div class="form-group"><label>Telefòn</label><input type="tel" id="setPhone" class="form-input"></div>
            <div class="form-group"><label>Nouvo Mòdepas</label><input type="password" id="setPass" class="form-input" placeholder="Kite vid si w pa vle chanje"></div>
            <button class="btn btn-primary" onclick="saveSettings()"><i class="fas fa-save"></i>Anrejistre</button>
        </div>
    </div>

</div>

<div class="modal" id="prodModal">
    <div class="modal-content">
        <div class="modal-header"><h3 id="modalTitle">Nouvo Pwodui</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
        <form onsubmit="saveProduct(event)" class="modal-body">
            <input type="hidden" id="prodId">
            <div class="form-group"><label>Non Pwodui *</label><input type="text" id="prodNom" class="form-input" required></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
                <div class="form-group"><label>Kategori *</label><select id="prodCat" class="form-input"><option value="dejene">🌅 Dejene</option><option value="dine">☀️ Dine</option><option value="soupe">🌙 Soupe</option><option value="desè">🍰 Desè</option><option value="bwason">🥤 Bwason</option><option value="glase">🍦 Glase</option></select></div>
                <div class="form-group"><label>Tan Prep (min)</label><input type="number" id="prodTan" class="form-input" value="15"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
                <div class="form-group"><label>Pri (GDS) *</label><input type="number" id="prodPri" class="form-input" required></div>
                <div class="form-group"><label>Pri Originèl</label><input type="number" id="prodPrio" class="form-input"></div>
            </div>
            <div class="form-group"><label>📸 Foto Pwodui</label>
                <div class="image-upload-box" onclick="document.getElementById('imageInput').click()"><i class="fas fa-cloud-upload-alt"></i><p style="color:var(--muted)">Klike pou telechaje foto</p></div>
                <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)" style="display:none">
                <img id="imagePreview" class="image-preview" style="display:none">
                <button type="button" class="btn btn-outline btn-sm" id="removeImageBtn" style="display:none;margin-top:0.5rem" onclick="removeImage()"><i class="fas fa-trash"></i>Retire Foto</button>
            </div>
            <div class="form-group"><label>🔗 Lyen (opsyonèl)</label><input type="url" id="prodLink" class="form-input" placeholder="https://..."></div>
            <div class="form-group"><label>Deskripsyon</label><textarea id="prodDesc" class="form-input" rows="2"></textarea></div>
            <div class="form-group"><label>Engredyan</label><input type="text" id="prodIngr" class="form-input" placeholder="Pen, Ze, Lèt"></div>
            <div class="form-group"><label><input type="checkbox" id="prodDisp" checked> Disponib</label></div>
            <div class="modal-footer"><button type="button" class="btn btn-outline" onclick="closeModal()">Anile</button><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i>Anrejistre</button></div>
        </form>
    </div>
</div>

<script>
var session=JSON.parse(localStorage.getItem('komandem-admin-session')||'null');
if(!session||session.expires<Date.now()||(session.user.role!=='merchant'&&session.user.role!=='superadmin')){localStorage.removeItem('komandem-admin-session');window.location.href='admin-login.html'}
var merchantId=session.user.merchantId||session.user.id;
var merchantName=session.user.non||'Machann';
document.getElementById('mName').textContent=merchantName;
var tempImageData=null;
var lastOrderCount=0;
var audioCtx=null;

function fm(m){return(m||0).toLocaleString('ht-HT')+' GDS'}
function gp(){return JSON.parse(localStorage.getItem('komandem-products')||'[]')}
function sp(d){localStorage.setItem('komandem-products',JSON.stringify(d))}
function go(){return JSON.parse(localStorage.getItem('komandem-orders')||'[]')}
function getMyProducts(){return gp().filter(function(p){return p.machann_id===merchantId})}
function getMyOrders(){return go().filter(function(o){return o.machann_id===merchantId||o.machann===merchantName})}

function showToast(msg,type){
    var styles={success:{bg:'linear-gradient(135deg,#22C55E,#16A34A)',emoji:'🎉'},error:{bg:'linear-gradient(135deg,#EF4444,#DC2626)',emoji:'😔'},warning:{bg:'linear-gradient(135deg,#F59E0B,#D97706)',emoji:'📢'},info:{bg:'linear-gradient(135deg,#3B82F6,#2563EB)',emoji:'💡'},order:{bg:'linear-gradient(135deg,#FF6B35,#E55A2B)',emoji:'🎊'}};
    var s=styles[type]||styles.info;
    var t=document.createElement('div');t.className='toast-notification';t.style.background=s.bg;
    t.innerHTML='<div style="display:flex;align-items:flex-start;gap:0.75rem"><div style="font-size:1.8rem">'+s.emoji+'</div><div style="flex:1"><div style="font-weight:800;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em;opacity:0.8;margin-bottom:0.2rem">'+(type==='success'?'Siksè!':type==='error'?'Erè':type==='warning'?'Atansyon':type==='order'?'Kòmand':'Info')+'</div><div style="font-size:0.9rem;line-height:1.4">'+msg+'</div></div><button onclick="this.parentElement.parentElement.remove()" style="background:rgba(255,255,255,0.2);border:none;color:white;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:0.8rem">✕</button></div>';
    document.body.appendChild(t);setTimeout(function(){t.style.right='20px'},50);
    setTimeout(function(){t.style.right='-400px';t.style.opacity='0';setTimeout(function(){if(t.parentNode)t.remove()},400)},4000);
    t.onclick=function(e){if(e.target.tagName==='BUTTON')return;t.style.right='-400px';t.style.opacity='0';setTimeout(function(){if(t.parentNode)t.remove()},400)};
}

function showTab(tab){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
    event.target.classList.add('active');
    document.getElementById('page'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
    if(tab==='products')renderProducts();
    if(tab==='orders')renderOrders();
    if(tab==='notifications')renderNotifications();
    if(tab==='settings')loadSettings();
}

function loadStats(){
    var p=getMyProducts(),o=getMyOrders();var today=new Date().toDateString();
    var to=o.filter(function(x){return x.dat&&new Date(x.dat).toDateString()===today});
    var pending=o.filter(function(x){return x.estat==='ann_atent'});
    document.getElementById('s1').textContent=p.length;document.getElementById('s2').textContent=pending.length;
    document.getElementById('s3').textContent=fm(to.reduce(function(a,x){return a+(x.total||0)},0));
    var merchants=JSON.parse(localStorage.getItem('komandem-merchants')||'[]');var me=merchants.find(function(m){return m.id===merchantId});
    document.getElementById('s4').textContent=fm(me?me.balans||0:0);
    document.getElementById('notifDot').style.display=pending.length>0?'inline':'none';
}
loadStats();

function handleImageUpload(event){var file=event.target.files[0];if(!file)return;if(file.size>2*1024*1024){alert('Fichye twò gwo!');return}var reader=new FileReader();reader.onload=function(e){tempImageData=e.target.result;document.getElementById('imagePreview').src=tempImageData;document.getElementById('imagePreview').style.display='block';document.getElementById('removeImageBtn').style.display='inline-flex'};reader.readAsDataURL(file)}
function removeImage(){tempImageData=null;document.getElementById('imagePreview').style.display='none';document.getElementById('removeImageBtn').style.display='none';document.getElementById('imageInput').value=''}

function renderProducts(){var p=getMyProducts();if(!p.length){document.getElementById('prodGrid').innerHTML='';document.getElementById('prodEmpty').style.display='block';return}document.getElementById('prodEmpty').style.display='none';document.getElementById('prodGrid').innerHTML=p.map(function(pr){var hasDiscount=pr.pri_originèl&&pr.pri_originèl>pr.pri;var imgHtml=pr.imaj?'<img src="'+pr.imaj+'" alt="'+pr.non+'">':'<div>🍽️</div>';return'<div class="product-card"><div class="product-img">'+imgHtml+'</div><div class="product-info"><h4>'+pr.non+'</h4><div class="price">'+fm(pr.pri)+(hasDiscount?' <span style="text-decoration:line-through;color:var(--muted);font-size:0.8rem">'+fm(pr.pri_originèl)+'</span>':'')+'</div><div class="meta">⏱ '+(pr.tan_preparasyon||15)+'min • '+(pr.kategori||'')+'</div>'+(pr.lyen?'<div class="meta"><a href="'+pr.lyen+'" target="_blank" style="color:var(--brand)">🔗 Lyen</a></div>':'')+'<div class="actions"><button class="btn btn-outline btn-sm" onclick="editProduct(\''+pr.id+'\')"><i class="fas fa-edit"></i></button><button class="btn btn-danger btn-sm" onclick="deleteProduct(\''+pr.id+'\')"><i class="fas fa-trash"></i></button></div></div></div>'}).join('')}
renderProducts();

function openForm(id){document.getElementById('prodModal').classList.add('show');document.getElementById('modalTitle').textContent=id?'Modifye Pwodui':'Nouvo Pwodui';tempImageData=null;document.getElementById('imagePreview').style.display='none';document.getElementById('removeImageBtn').style.display='none';document.getElementById('imageInput').value='';if(id){var p=getMyProducts().find(function(x){return x.id===id});if(p){document.getElementById('prodId').value=p.id;document.getElementById('prodNom').value=p.non;document.getElementById('prodCat').value=p.kategori;document.getElementById('prodTan').value=p.tan_preparasyon||15;document.getElementById('prodPri').value=p.pri;document.getElementById('prodPrio').value=p.pri_originèl||'';document.getElementById('prodLink').value=p.lyen||'';document.getElementById('prodDesc').value=p.deskripsyon||'';document.getElementById('prodIngr').value=(p.engredyan||[]).join(', ');document.getElementById('prodDisp').checked=p.disponib!==false;if(p.imaj){document.getElementById('imagePreview').src=p.imaj;document.getElementById('imagePreview').style.display='block';document.getElementById('removeImageBtn').style.display='inline-flex'}}}else{document.querySelector('#prodModal form').reset();document.getElementById('prodId').value='';document.getElementById('prodTan').value=15;document.getElementById('prodDisp').checked=true}}
function closeModal(){document.getElementById('prodModal').classList.remove('show')}

function saveProduct(e){e.preventDefault();var id=document.getElementById('prodId').value;var pr={id:id||'prod_'+Date.now(),non:document.getElementById('prodNom').value,kategori:document.getElementById('prodCat').value,machann_id:merchantId,machann_non:merchantName,pri:parseInt(document.getElementById('prodPri').value),pri_originèl:document.getElementById('prodPrio').value?parseInt(document.getElementById('prodPrio').value):null,tan_preparasyon:parseInt(document.getElementById('prodTan').value),deskripsyon:document.getElementById('prodDesc').value,engredyan:document.getElementById('prodIngr').value.split(',').map(function(x){return x.trim()}).filter(function(x){return x}),disponib:document.getElementById('prodDisp').checked,imaj:tempImageData||(id?getMyProducts().find(function(x){return x.id===id})?.imaj:null)||'',lyen:document.getElementById('prodLink').value,evalyasyon:0,total_vant:0};var all=gp();if(id){var i=all.findIndex(function(x){return x.id===id});if(i>=0)all[i]=Object.assign(all[i],pr)}else{all.push(pr)}sp(all);closeModal();renderProducts();loadStats();showToast('✅ Pwodui anrejistre!','success')}
function editProduct(id){openForm(id)}
function deleteProduct(id){if(confirm('Retire?')){sp(gp().filter(function(x){return x.id!==id}));renderProducts();loadStats()}}

function renderOrders(){var o=getMyOrders();var labels={ann_atent:'An Atant',konfime:'Konfime',an_preparasyon:'An Preparasyon',prè:'Prè',an_wout:'An Wout',livre:'Livre'};var colors={ann_atent:'badge-warning',konfime:'badge-info',an_preparasyon:'badge-purple',prè:'badge-success',an_wout:'badge-brand',livre:'badge-success'};document.getElementById('ordBody').innerHTML=o.length?o.map(function(ord){var actionBtn='';if(ord.estat==='ann_atent'){actionBtn='<button class="btn btn-success btn-sm" onclick="confirmOrder(\''+ord.id+'\')">✅ Konfime</button>'}else if(ord.estat==='konfime'||ord.estat==='an_preparasyon'){actionBtn='<button class="btn btn-primary btn-sm" onclick="markReady(\''+ord.id+'\')">📦 Pare</button>'}return'<tr><td><strong style="color:var(--brand)">'+(ord.id||'KMD')+'</strong></td><td>'+(ord.kliyan||'-')+'<br><small style="color:var(--muted)">📞 '+(ord.kliyan_tel||'')+'</small></td><td>'+((ord.atik||[]).map(function(a){return a.kantite+'x '+a.non}).join(', '))+'</td><td>'+fm(ord.total)+'</td><td><span class="badge '+(colors[ord.estat]||'badge-warning')+'">'+(labels[ord.estat]||ord.estat)+'</span></td><td>'+actionBtn+'</td></tr>'}).join(''):'<tr><td colspan="6">Pa gen kòmand</td></tr>'}

// 🔔 KONFIME KÒMAND
function confirmOrder(orderId){if(confirm('Konfime kòmand #'+orderId+'?')){var orders=go();var idx=orders.findIndex(function(o){return o.id===orderId});if(idx>=0){orders[idx].estat='konfime';localStorage.setItem('komandem-orders',JSON.stringify(orders));renderOrders();loadStats();showToast('✅ Kòmand konfime!','success')}}}

// 📦 METE PARE + NOTIFYE LIVRÈ
function markReady(orderId){if(confirm('Kòmand #'+orderId+' pare pou livre?')){var orders=go();var idx=orders.findIndex(function(o){return o.id===orderId});if(idx>=0){orders[idx].estat='prè';localStorage.setItem('komandem-orders',JSON.stringify(orders));var drivers=JSON.parse(localStorage.getItem('komandem-drivers')||'[]');var availDrivers=drivers.filter(function(d){return d.estat==='disponib'||d.estat==='online'});var notifs=JSON.parse(localStorage.getItem('komandem-notifications')||'[]');availDrivers.forEach(function(d){notifs.unshift({message:'📦 Kòmand #'+orderId+' PARE!',time:new Date().toISOString(),read:false,type:'livrè',driver_id:d.id,order_id:orderId,address:orders[idx].adrès_livrezon?.ri||'Gonayiv',customer:orders[idx].kliyan||'',phone:orders[idx].kliyan_tel||''})});localStorage.setItem('komandem-notifications',JSON.stringify(notifs));renderOrders();loadStats();showToast('📦 Kòmand pare! '+availDrivers.length+' livrè notifye!','success')}}}

function renderNotifications(){var notifs=JSON.parse(localStorage.getItem('komandem-notifications')||'[]');var my=notifs.filter(function(n){return n.type==='machann'&&n.machann_id===merchantId});document.getElementById('notifBody').innerHTML=my.length?my.map(function(n){return'<div class="notif-item '+(n.read?'':'new')+'"><div>'+(n.read?'':'🔵 ')+n.message+'<br><small style="color:var(--muted)">'+new Date(n.time).toLocaleString('ht-HT')+'</small></div></div>'}).join(''):'<p style="text-align:center;color:var(--muted);padding:2rem">Pa gen notifikasyon</p>'}

function loadSettings(){var merchants=JSON.parse(localStorage.getItem('komandem-merchants')||'[]');var me=merchants.find(function(m){return m.id===merchantId});if(me){document.getElementById('setName').value=me.non_biznis;document.getElementById('setPhone').value=me.telefòn}}
function saveSettings(){var merchants=JSON.parse(localStorage.getItem('komandem-merchants')||'[]');var me=merchants.find(function(m){return m.id===merchantId});if(me){me.non_biznis=document.getElementById('setName').value;me.telefòn=document.getElementById('setPhone').value;var p=document.getElementById('setPass').value;if(p)me.password=p;localStorage.setItem('komandem-merchants',JSON.stringify(merchants));merchantName=me.non_biznis;document.getElementById('mName').textContent=merchantName;showToast('✅ Paramèt anrejistre!','success')}}

// ===== SISTÈM NOTIFIKASYON SON POU NOUVO KÒMAND =====
function playNotificationSound(){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();var osc=audioCtx.createOscillator();var gain=audioCtx.createGain();osc.connect(gain);gain.connect(audioCtx.destination);osc.frequency.value=800;osc.type='sine';gain.gain.value=0.3;osc.start();setTimeout(function(){osc.frequency.value=1000},150);setTimeout(function(){osc.stop()},350)}catch(e){}}

function checkNewOrders(){var orders=go();var myOrders=orders.filter(function(o){return(o.machann_id===merchantId||o.machann===merchantName)&&o.estat==='ann_atent'});if(myOrders.length>lastOrderCount){var latest=myOrders[0];playNotificationSound();var notifDiv=document.createElement('div');notifDiv.className='order-notif';notifDiv.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#FF6B35,#E55A2B);color:white;padding:1.5rem 2rem;border-radius:20px;z-index:9999;box-shadow:0 20px 60px rgba(0,0,0,0.5);text-align:center;animation:slideDown 0.5s ease;cursor:pointer;max-width:420px;width:90%';notifDiv.innerHTML='<div style="font-size:2rem;margin-bottom:0.5rem">🔔</div><h3 style="margin-bottom:0.5rem">🛒 Nouvo Kòmand!</h3><p style="font-size:1.2rem;font-weight:700">#'+latest.id+'</p><p style="font-size:0.9rem;opacity:0.9">👤 '+latest.kliyan+' • 💰 '+fm(latest.total)+'</p><p style="font-size:0.8rem;opacity:0.7;margin-top:0.5rem">Klike pou wè detay</p>';notifDiv.onclick=function(){notifDiv.remove();showTab('orders')};document.body.appendChild(notifDiv);setTimeout(function(){if(notifDiv.parentNode)notifDiv.remove()},12000);if('Notification'in window&&Notification.permission==='granted'){new Notification('🛒 Nouvo Kòmand #'+latest.id,{body:latest.kliyan+' • '+fm(latest.total),icon:'🍔',vibrate:[200,100,200]})}}lastOrderCount=myOrders.length}

if('Notification'in window&&Notification.permission==='default'){Notification.requestPermission()}
setInterval(function(){checkNewOrders();loadStats()},10000);
setTimeout(checkNewOrders,2000);

function logout(){localStorage.removeItem('komandem-admin-session');window.location.href='admin-login.html'}
</script>
</body>
</html>
