<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF6B35">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://cdnjs.cloudflare.com;">
    <title>Dashboard Kliyan - KòmandeM</title>
    <link rel="icon" type="image/png" href="assets/images/logo-komndem.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{--brand:#FF6B35;--dark:#0A0A1A;--card:#1E293B;--border:rgba(255,255,255,0.06);--text:#E2E8F0;--muted:#94A3B8;--success:#22C55E;--danger:#EF4444;--warning:#F59E0B;--radius:14px;--radius-lg:20px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--dark);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
        .topbar{background:var(--card);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:0.75rem}
        .topbar h1{font-size:1.2rem;font-weight:800}.topbar h1 span{color:var(--brand)}
        .topbar-logo{display:flex;align-items:center;gap:0.5rem}
        .topbar-logo img{height:35px;border-radius:8px}
        .btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.6rem 1.2rem;border-radius:var(--radius);font-weight:600;font-size:0.85rem;cursor:pointer;border:none;font-family:inherit;text-decoration:none;transition:all 0.2s}
        .btn-primary{background:var(--brand);color:white}.btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.1);color:white}
        .btn-danger{background:rgba(239,68,68,0.1);color:var(--danger)}.btn-success{background:rgba(34,197,94,0.1);color:var(--success);border:1px solid rgba(34,197,94,0.2)}
        .btn-sm{padding:0.35rem 0.75rem;font-size:0.78rem}
        .container{max-width:1000px;margin:0 auto;padding:1.5rem}
        .tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
        .tab{padding:0.7rem 1.5rem;border-radius:var(--radius);cursor:pointer;font-weight:600;font-size:0.9rem;background:rgba(255,255,255,0.03);color:var(--muted);border:none;font-family:inherit}
        .tab.active{background:var(--brand);color:white}
        .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1.5rem;overflow:hidden}
        .card-header{padding:1rem;border-bottom:1px solid var(--border)}.card-header h3{font-weight:700;font-size:0.95rem}
        .card-body{padding:1rem}
        .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
        .product-card{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all 0.3s}
        .product-card:hover{border-color:var(--brand);transform:translateY(-3px)}
        .product-img{height:140px;background:rgba(255,107,53,0.05);display:flex;align-items:center;justify-content:center;font-size:2.5rem}
        .product-img img{width:100%;height:100%;object-fit:cover}
        .product-info{padding:0.85rem}.product-info h4{font-size:0.85rem;margin-bottom:0.2rem}
        .product-info .price{font-size:1rem;font-weight:700;color:var(--brand)}
        .badge{display:inline-flex;padding:0.15rem 0.5rem;border-radius:999px;font-size:0.65rem;font-weight:600}
        .badge-brand{background:rgba(255,107,53,0.1);color:var(--brand)}.badge-success{background:rgba(34,197,94,0.1);color:var(--success)}
        .badge-warning{background:rgba(245,158,11,0.1);color:var(--warning)}
        .page{display:none}.page.active{display:block}
        .cart-item{display:flex;align-items:center;gap:0.75rem;padding:0.75rem;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:0.5rem}
        .cart-item-img{width:50px;height:50px;background:rgba(255,107,53,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
        .cart-item-info{flex:1}.cart-item-info h4{font-size:0.85rem;color:white}.cart-item-info span{font-size:0.7rem;color:var(--muted)}
        .cart-item-price{font-weight:700;font-size:0.9rem}
        .cart-summary{background:rgba(255,107,53,0.05);border:1px solid rgba(255,107,53,0.1);border-radius:var(--radius-lg);padding:1rem;margin-top:1rem}
        .summary-line{display:flex;justify-content:space-between;padding:0.3rem 0;font-size:0.85rem;color:var(--muted)}
        .summary-line.total{font-size:1.1rem;font-weight:700;color:white;border-top:1px solid var(--border);padding-top:0.5rem;margin-top:0.3rem}
        .form-group{margin-bottom:0.75rem}.form-group label{display:block;font-weight:600;font-size:0.8rem;color:var(--text);margin-bottom:0.3rem}
        .form-input{width:100%;padding:0.65rem;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius);color:white;font-size:0.85rem;outline:none;font-family:inherit;box-sizing:border-box}
        .form-input:focus{border-color:var(--brand)}
        .order-card{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0.85rem;margin-bottom:0.5rem}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem}
        .modal.show{display:flex}.modal-content{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
        .modal-header{padding:1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
        .modal-close{background:none;border:none;color:#64748B;font-size:1.2rem;cursor:pointer}.modal-body{padding:1rem}
        .cart-fab{position:fixed;bottom:20px;right:20px;background:var(--brand);color:white;width:55px;height:55px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 8px 25px rgba(255,107,53,0.4);cursor:pointer;z-index:100}
        .cart-count{position:absolute;top:-5px;right:-5px;background:var(--danger);color:white;width:22px;height:22px;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center;font-weight:700}
        .promo-box{background:linear-gradient(135deg,rgba(255,107,53,0.08),rgba(255,107,53,0.02));border:1px solid rgba(255,107,53,0.2);border-radius:var(--radius);padding:1rem;margin:0.75rem 0}
        @media(max-width:768px){.topbar{padding:1rem}.container{padding:1rem}.product-grid{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-logo">
        <img src="assets/images/logo-komndem.png" alt="KòmandeM" onerror="this.style.display='none'">
        <h1>👤 <span id="kliyanName">Kliyan</span></h1>
    </div>
    <div style="display:flex;gap:0.5rem">
        <a href="index.html" class="btn btn-outline btn-sm">🏠 Akèy</a>
        <button class="btn btn-danger btn-sm" onclick="logout()">Dekonekte</button>
    </div>
</div>

<div class="container">
    <div class="tabs">
        <button class="tab active" onclick="showTab('menu')">📋 Menu</button>
        <button class="tab" onclick="showTab('cart')">🛒 Panye <span id="cartBadge" style="background:var(--brand);color:white;padding:0.1rem 0.4rem;border-radius:999px;font-size:0.7rem;margin-left:0.25rem">0</span></button>
        <button class="tab" onclick="showTab('orders')">📦 Kòmand</button>
    </div>
    
    <div class="page active" id="pageMenu">
        <div class="card"><div class="card-header"><h3>🍽️ Menu Disponib</h3></div>
        <div class="card-body"><div class="product-grid" id="menuGrid"></div><p id="noMenu" style="display:none;text-align:center;color:var(--muted);padding:2rem">Pa gen pwodui</p></div></div>
    </div>
    
    <div class="page" id="pageCart">
        <div class="card"><div class="card-header"><h3>🛒 Panye</h3></div>
        <div class="card-body">
            <div id="cartItems"></div>
            <div id="emptyCart" style="text-align:center;color:var(--muted);padding:2rem;display:none">🛒 Panye vid</div>
            <div id="cartSummary" class="cart-summary" style="display:none">
                <div class="summary-line"><span>Sou-Total</span><span id="sumSub">0 GDS</span></div>
                <div class="summary-line"><span>Tax (10%)</span><span id="sumTax">0 GDS</span></div>
                <div class="summary-line" id="serviceLine"><span>Frè Sèvis</span><span id="sumService">25 GDS</span></div>
                <div class="summary-line"><span>Frè Livrezon</span><span id="sumDelivery">50 GDS</span></div>
                <div class="summary-line total"><span>Total</span><span id="sumTotal">0 GDS</span></div>
                <button class="btn btn-primary" style="width:100%;margin-top:0.5rem" onclick="showCheckout()">💳 Ale nan Peman</button>
            </div>
        </div></div>
    </div>
    
    <div class="page" id="pageOrders">
        <div class="card"><div class="card-header"><h3>📦 Kòmand</h3></div><div class="card-body" id="ordersList"></div></div>
    </div>
</div>

<div class="modal" id="checkoutModal">
    <div class="modal-content">
        <div class="modal-header"><h3>📋 Konfime Kòmand</h3><button class="modal-close" onclick="closeCheckout()">&times;</button></div>
        <div class="modal-body">
            <div class="form-group"><label>Non *</label><input type="text" id="coName" class="form-input" required></div>
            <div class="form-group"><label>Telefòn *</label><input type="tel" id="coPhone" class="form-input" required></div>
            <div class="form-group"><label>📍 Zòn Livrezon *</label>
                <select id="coZone" class="form-input" onchange="updateFee()" required>
                    <option value="">-- Chwazi Zòn --</option>
                    <optgroup label="50 GDS"><option value="gastro">Gatro</option><option value="kaf_turenne">Kaf Turenne</option><option value="rout_basen">Rout Basen</option></optgroup>
                    <optgroup label="75 GDS"><option value="oporto">Oporto</option><option value="mapou">Mapou</option><option value="kafou_gro_morne">Kafou Gro Morne</option><option value="k_soley">K-Soley</option><option value="byennak">Byennak</option></optgroup>
                    <optgroup label="100 GDS"><option value="broidhomme">Broïdhomme</option><option value="pravil">Pravil</option><option value="centre_ville">Centre Ville</option></optgroup>
                    <optgroup label="150 GDS"><option value="dechaos">Dechaos</option><option value="bigo">Bigo</option></optgroup>
                </select>
            </div>
            <div class="form-group"><label>Adrès *</label><textarea id="coAddr" class="form-input" rows="2" required></textarea></div>
            
            <!-- 🎟️ KÒD PROMO -->
            <div class="promo-box">
                <p style="font-weight:700;color:var(--brand);margin-bottom:0.5rem">🎟️ Kòd Promo Lansman</p>
                <div style="display:flex;gap:0.5rem">
                    <input type="text" id="coPromo" class="form-input" placeholder="Antre kòd promo" style="flex:1">
                    <button class="btn btn-success btn-sm" onclick="applyPromo()" style="white-space:nowrap">🎯 Aplike</button>
                </div>
                <p id="promoStatus" style="font-size:0.8rem;margin-top:0.5rem;display:none"></p>
            </div>
            
            <div style="background:rgba(255,107,53,0.05);padding:0.75rem;border-radius:var(--radius);margin:0.75rem 0">
                <strong style="color:var(--brand)">💳 NatCash: 32924776</strong> | Non: KòmandeM
            </div>
            <p style="font-weight:700">Total: <span id="coTotal" style="color:var(--brand);font-size:1.2rem">0 GDS</span></p>
            <div style="display:flex;gap:0.5rem">
                <button class="btn btn-outline" style="flex:1" onclick="closeCheckout()">Anile</button>
                <button class="btn btn-primary" style="flex:1" onclick="placeOrder()">✅ Konfime</button>
            </div>
        </div>
    </div>
</div>

<div class="cart-fab" onclick="showTab('cart')"><i class="fas fa-shopping-bag"></i><span class="cart-count" id="cartFabCount" style="display:none">0</span></div>

<script src="js/security.js"></script>
<script>
var cart=JSON.parse(localStorage.getItem('komandem-panye-temp')||'[]');
var session=JSON.parse(localStorage.getItem('komandem-kliyan-session')||'null');
if(!session||session.expires<Date.now()){session={user:{id:'invite_'+Date.now(),non:'Kliyan',telefòn:'',email:''},loginTime:new Date().toISOString(),expires:Date.now()+(24*60*60*1000)};localStorage.setItem('komandem-kliyan-session',JSON.stringify(session))}
var kliyan=session.user;document.getElementById('kliyanName').textContent=kliyan.non||'Kliyan';

// Zòn
var ZON={gastro:{non:'Gatro',pri:50},kaf_turenne:{non:'Kaf Turenne',pri:50},rout_basen:{non:'Rout Basen',pri:50},oporto:{non:'Oporto',pri:75},mapou:{non:'Mapou',pri:75},kafou_gro_morne:{non:'Kafou Gro Morne',pri:75},k_soley:{non:'K-Soley',pri:75},byennak:{non:'Byennak',pri:75},broidhomme:{non:'Broïdhomme',pri:100},pravil:{non:'Pravil',pri:100},centre_ville:{non:'Centre Ville',pri:100},dechaos:{non:'Dechaos',pri:150},bigo:{non:'Bigo',pri:150}};
var selZone=null,deliveryFee=50;

// 🎟️ SISTÈM KÒD PROMO
var PROMO_CODES={AOUT2026:{code:'AOUT2026',description:'Livrezon Gratis + Frè Sèvis Ofri + Pri Espesyal',deliveryFree:true,serviceFree:true,validUntil:'2026-08-31'}};
var PROMO_PRODUCTS={'pen_a_ze':{non:'Pen A Ze',priPromo:150,priNormal:200,emoji:'🥖'},'spaghetti':{non:'Spaghetti',priPromo:350,priNormal:500,emoji:'🍝'},'ji_naturel':{non:'Ji Naturèl',priPromo:100,priNormal:150,emoji:'🥤'}};
var activePromo=null,promoApplied=false;

function fm(m){return(m||0).toLocaleString('ht-HT')+' GDS'}

function showTab(tab){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});event.target.classList.add('active');document.getElementById('page'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');if(tab==='menu')loadMenu();if(tab==='cart')renderCart();if(tab==='orders')loadOrders()}

function loadMenu(){var p=JSON.parse(localStorage.getItem('komandem-products')||'[]');var m=JSON.parse(localStorage.getItem('komandem-menu-du-jour')||'[]');var today=new Date().toDateString();var tm=m.filter(function(x){return x.dat===today&&x.disponib!==false});var avail=tm.length?tm:p.filter(function(x){return x.disponib!==false});if(!avail.length){document.getElementById('menuGrid').innerHTML='';document.getElementById('noMenu').style.display='block';return}document.getElementById('noMenu').style.display='none';document.getElementById('menuGrid').innerHTML=avail.map(function(pr){var img=pr.imaj&&pr.imaj.length>5?'<img src="'+pr.imaj+'" alt="'+pr.non+'" style="width:100%;height:100%;object-fit:cover">':'<div>🍽️</div>';var specialPrice=null;if(activePromo&&PROMO_PRODUCTS[pr.id]){specialPrice=PROMO_PRODUCTS[pr.id].priPromo}var priceHtml='';if(specialPrice){priceHtml='<span class="price" style="color:#22C55E">'+specialPrice.toLocaleString('ht-HT')+' GDS</span><span style="text-decoration:line-through;color:var(--muted);font-size:0.7rem;margin-left:0.3rem">'+(pr.pri||0).toLocaleString('ht-HT')+' GDS</span><div style="font-size:0.6rem;color:#22C55E;margin-top:0.1rem">🎉 Pri Promo Out!</div>'}else{priceHtml='<span class="price">'+(pr.pri||0).toLocaleString('ht-HT')+' GDS</span>'}return'<div class="product-card" onclick="addToCart(\''+pr.id+'\')"><div class="product-img">'+img+'</div><div class="product-info"><span class="badge badge-brand">'+(pr.kategori||'')+'</span><h4>'+pr.non+'</h4>'+priceHtml+'</div></div>'}).join('')}

function addToCart(pid){var p=JSON.parse(localStorage.getItem('komandem-products')||'[]');var pr=p.find(function(x){return x.id===pid});if(!pr)return;var ex=cart.find(function(i){return i.pwodui_id===pid});if(ex){ex.kantite++;ex.pri_total=ex.kantite*ex.pri_inite}else{var price=pr.pri;if(activePromo&&PROMO_PRODUCTS[pr.id]){price=PROMO_PRODUCTS[pr.id].priPromo}cart.push({pwodui_id:pr.id,non:pr.non,pri_inite:price,kantite:1,pri_total:price,machann_id:pr.machann_id,machann_non:pr.machann_non})}localStorage.setItem('komandem-panye-temp',JSON.stringify(cart));updateBadges()}

function renderCart(){if(!cart.length){document.getElementById('cartItems').innerHTML='';document.getElementById('emptyCart').style.display='block';document.getElementById('cartSummary').style.display='none';return}document.getElementById('emptyCart').style.display='none';document.getElementById('cartSummary').style.display='block';document.getElementById('cartItems').innerHTML=cart.map(function(item,idx){return'<div class="cart-item"><div class="cart-item-img">🍽️</div><div class="cart-item-info"><h4>'+item.non+'</h4><span>'+item.kantite+'x • '+fm(item.pri_inite)+'/chak</span></div><div class="cart-item-price">'+fm(item.pri_total)+'</div><button class="btn btn-danger btn-sm" onclick="removeItem('+idx+')" style="padding:0.2rem 0.5rem">✕</button></div>'}).join('');updateCartSummary()}

function updateCartSummary(){var sub=cart.reduce(function(s,i){return s+i.pri_total},0),tax=Math.round(sub*0.1);var serviceFee=(activePromo&&activePromo.serviceFree)?0:25;var delFee=(activePromo&&activePromo.deliveryFree)?0:deliveryFee;var total=sub+tax+serviceFee+delFee;document.getElementById('sumSub').textContent=fm(sub);document.getElementById('sumTax').textContent=fm(tax);document.getElementById('sumService').textContent=serviceFee===0?'GRATIS 🎉':fm(serviceFee);document.getElementById('sumService').style.color=serviceFee===0?'#22C55E':'';document.getElementById('sumDelivery').textContent=delFee===0?'GRATIS 🎉':fm(delFee);document.getElementById('sumDelivery').style.color=delFee===0?'#22C55E':'';document.getElementById('sumTotal').textContent=fm(total);if(document.getElementById('coTotal'))document.getElementById('coTotal').textContent=fm(total)}

function removeItem(idx){cart.splice(idx,1);localStorage.setItem('komandem-panye-temp',JSON.stringify(cart));renderCart();updateBadges()}

function updateFee(){var z=document.getElementById('coZone').value;selZone=z;deliveryFee=z?ZON[z].pri:50;updateCartSummary()}

function applyPromo(){var code=document.getElementById('coPromo').value.trim().toUpperCase();var status=document.getElementById('promoStatus');if(!code){status.style.display='block';status.innerHTML='<span style="color:#F59E0B">⚠️ Antre yon kòd promo</span>';return}if(PROMO_CODES[code]){var promo=PROMO_CODES[code];var validUntil=new Date(promo.validUntil);if(validUntil<new Date()){status.style.display='block';status.innerHTML='<span style="color:#EF4444">❌ Kòd sa a ekspire! Valab jiska 31 Out 2026</span>';activePromo=null;promoApplied=false;return}activePromo=promo;promoApplied=true;status.style.display='block';status.innerHTML='<span style="color:#22C55E;font-weight:700">✅ Kòd AOUT2026 aplike! 🎉</span><br><span style="color:#22C55E">🚚 Livrezon GRATIS</span> • <span style="color:#22C55E">🛍️ Frè Sèvis GRATIS</span>';deliveryFee=0;updateCartSummary();loadMenu()}else{status.style.display='block';status.innerHTML='<span style="color:#EF4444">❌ Kòd promo pa valid! Eseye: AOUT2026</span>';activePromo=null;promoApplied=false;deliveryFee=selZone?ZON[selZone].pri:50;updateCartSummary()}}

function showCheckout(){if(!cart.length){alert('Panye vid!');return}document.getElementById('coName').value=kliyan.non||'';document.getElementById('coPhone').value=kliyan.telefòn||'';updateFee();document.getElementById('checkoutModal').classList.add('show')}
function closeCheckout(){document.getElementById('checkoutModal').classList.remove('show')}

function placeOrder(){var n=document.getElementById('coName').value.trim(),p=document.getElementById('coPhone').value.trim(),a=document.getElementById('coAddr').value.trim(),z=document.getElementById('coZone').value;if(!n||!p||!a||!z){alert('Ranpli tout chan!');return}var zn=ZON[z];var sub=cart.reduce(function(s,i){return s+i.pri_total},0),tax=Math.round(sub*0.1);var sf=(activePromo&&activePromo.serviceFree)?0:25;var df=(activePromo&&activePromo.deliveryFree)?0:zn.pri;var tot=sub+tax+sf+df;var ord={id:'KMD-'+Date.now().toString(36).toUpperCase(),kliyan:n,kliyan_tel:p,kliyan_id:kliyan.id,atik:cart,sou_total:sub,tax:tax,frè_sèvis:sf,frè_livrezon:df,total:tot,estat:'ann_atent',adrès_livrezon:{ri:a},zone:zn.non,kòd_promo:activePromo?activePromo.code:null,livrezon_gratis:activePromo?activePromo.deliveryFree:false,frè_sèvis_ofri:activePromo?activePromo.serviceFree:false,dat:new Date().toISOString()};var orders=JSON.parse(localStorage.getItem('komandem-orders')||'[]');orders.unshift(ord);localStorage.setItem('komandem-orders',JSON.stringify(orders));localStorage.setItem('komandem-panye-temp','[]');cart=[];activePromo=null;promoApplied=false;var notifs=JSON.parse(localStorage.getItem('komandem-notifications')||'[]');notifs.unshift({message:'🛒 Nouvo kòmand #'+ord.id+' - '+fm(tot)+' | 📍 '+zn.non+(ord.kòd_promo?' | 🎟️ '+ord.kòd_promo:''),time:new Date().toISOString(),type:'machann',machann_id:ord.atik[0]?.machann_id});localStorage.setItem('komandem-notifications',JSON.stringify(notifs));closeCheckout();updateBadges();showTab('orders');alert('✅ Kòmand #'+ord.id+' konfime!\n📍 '+zn.non+' • 💰 '+fm(tot)+(ord.kòd_promo?'\n🎟️ Promo: '+ord.kòd_promo:''))}

function loadOrders(){var o=JSON.parse(localStorage.getItem('komandem-orders')||'[]');var my=o.filter(function(x){return x.kliyan_tel===kliyan.telefòn||x.kliyan_id===kliyan.id});var labels={ann_atent:'⏳ An Atant',konfime:'✅ Konfime',an_preparasyon:'👨‍🍳 Prepare',an_wout:'🛵 An Wout',livre:'🏁 Livre'};var colors={ann_atent:'badge-warning',konfime:'badge-info',an_preparasyon:'badge-info',an_wout:'badge-brand',livre:'badge-success'};document.getElementById('ordersList').innerHTML=my.length?my.map(function(x){return'<div class="order-card"><div style="display:flex;justify-content:space-between"><strong style="color:var(--brand)">#'+x.id+'</strong><span class="badge '+(colors[x.estat]||'badge-warning')+'">'+(labels[x.estat]||x.estat)+'</span></div><p style="color:var(--muted);font-size:0.8rem">'+((x.atik||[]).map(function(a){return a.kantite+'x '+a.non}).join(', '))+'</p><p style="font-weight:600">'+fm(x.total)+' | 📍 '+(x.zone||'')+(x.kòd_promo?' | 🎟️ Promo':'')+(x.livrezon_gratis?' | 🚚 Gratis':'')+'</p></div>'}).join(''):'<p style="text-align:center;color:var(--muted);padding:2rem">Pa gen kòmand</p>'}

function updateBadges(){var c=cart.reduce(function(s,i){return s+i.kantite},0);document.getElementById('cartBadge').textContent=c;document.getElementById('cartBadge').style.display=c>0?'inline':'none';document.getElementById('cartFabCount').textContent=c;document.getElementById('cartFabCount').style.display=c>0?'flex':'none'}
function logout(){localStorage.removeItem('komandem-kliyan-session');window.location.href='index.html'}
loadMenu();updateBadges();
</script>
</body>
</html>
