<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kliyan - KòmandeM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{--brand:#FF6B35;--dark:#0A0A1A;--card:#1E293B;--border:rgba(255,255,255,0.06);--text:#E2E8F0;--muted:#94A3B8;--success:#22C55E;--danger:#EF4444;--warning:#F59E0B;--radius:14px;--radius-lg:20px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--dark);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
        .topbar{background:var(--card);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
        .topbar h1{font-size:1.2rem}.topbar h1 span{color:var(--brand)}
        .btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.6rem 1.2rem;border-radius:var(--radius);font-weight:600;font-size:0.85rem;cursor:pointer;border:none;font-family:inherit;transition:all 0.2s}
        .btn-primary{background:var(--brand);color:white}.btn-primary:hover{background:#E55A2B}
        .btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.1);color:white}
        .btn-danger{background:rgba(239,68,68,0.1);color:var(--danger)}
        .btn-success{background:rgba(34,197,94,0.1);color:var(--success)}
        .btn-sm{padding:0.35rem 0.75rem;font-size:0.78rem}
        
        .container{max-width:1000px;margin:0 auto;padding:1.5rem}
        
        .tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
        .tab{padding:0.7rem 1.5rem;border-radius:var(--radius);cursor:pointer;font-weight:600;font-size:0.9rem;background:rgba(255,255,255,0.03);color:var(--muted);border:none;font-family:inherit;transition:all 0.3s}
        .tab.active{background:var(--brand);color:white;box-shadow:0 4px 15px rgba(255,107,53,0.3)}
        
        .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1.5rem;overflow:hidden}
        .card-header{padding:1.25rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .card-header h3{font-weight:700;font-size:1rem}
        .card-body{padding:1.25rem}
        
        .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
        .product-card{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all 0.3s}
        .product-card:hover{border-color:var(--brand);transform:translateY(-3px)}
        .product-img{height:150px;background:rgba(255,107,53,0.05);display:flex;align-items:center;justify-content:center;font-size:3rem}
        .product-img img{width:100%;height:100%;object-fit:cover}
        .product-info{padding:1rem}
        .product-info h4{font-size:0.9rem;margin-bottom:0.25rem}
        .product-info .price{font-size:1.1rem;font-weight:700;color:var(--brand)}
        .product-info .merchant{font-size:0.75rem;color:var(--muted)}
        
        .badge{display:inline-flex;padding:0.2rem 0.6rem;border-radius:999px;font-size:0.7rem;font-weight:600}
        .badge-success{background:rgba(34,197,94,0.1);color:var(--success)}
        .badge-warning{background:rgba(245,158,11,0.1);color:var(--warning)}
        .badge-brand{background:rgba(255,107,53,0.1);color:var(--brand)}
        .badge-info{background:rgba(59,130,246,0.1);color:#3B82F6}
        
        .cart-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem 0;border-bottom:1px solid var(--border)}
        .cart-item span{font-size:0.9rem}
        
        .form-group{margin-bottom:1rem}
        .form-group label{display:block;font-weight:600;font-size:0.85rem;color:var(--text);margin-bottom:0.4rem}
        .form-input{width:100%;padding:0.75rem;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius);color:white;font-size:0.9rem;outline:none;font-family:inherit;box-sizing:border-box}
        .form-input:focus{border-color:var(--brand)}
        textarea.form-input{resize:vertical;min-height:60px}
        
        .order-card{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;margin-bottom:0.75rem}
        
        .cart-fab{position:fixed;bottom:20px;right:20px;background:var(--brand);color:white;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;box-shadow:0 8px 30px rgba(255,107,53,0.4);cursor:pointer;z-index:100}
        .cart-count{position:absolute;top:-5px;right:-5px;background:var(--danger);color:white;width:24px;height:24px;border-radius:50%;font-size:0.7rem;display:flex;align-items:center;justify-content:center;font-weight:700}
        
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
        .modal.show{display:flex}
        .modal-content{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,0.5)}
        
        .page{display:none}.page.active{display:block}
        
        @media(max-width:768px){.topbar{padding:1rem}.container{padding:1rem}.product-grid{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>

<div class="topbar">
    <h1>👤 <span id="kliyanName">Kliyan</span></h1>
    <div style="display:flex;gap:0.5rem">
        <a href="index.html" class="btn btn-outline btn-sm">🏠 Akèy</a>
        <button class="btn btn-danger btn-sm" onclick="logout()">Dekonekte</button>
    </div>
</div>

<div class="container">
    
    <div class="tabs">
        <button class="tab active" onclick="showTab('menu')">📋 Menu</button>
        <button class="tab" onclick="showTab('cart')">🛒 Panye <span id="cartBadge" style="background:var(--brand);color:white;padding:0.1rem 0.4rem;border-radius:999px;font-size:0.7rem;margin-left:0.25rem">0</span></button>
        <button class="tab" onclick="showTab('orders')">📦 Kòmand</button>
    </div>

    <!-- MENU -->
    <div class="page active" id="pageMenu">
        <div class="card"><div class="card-header"><h3>🍽️ Menu Disponib</h3></div>
        <div class="card-body"><div class="product-grid" id="menuGrid"></div><p id="noMenu" style="display:none;text-align:center;color:var(--muted)">Pa gen pwodui disponib</p></div></div>
    </div>

    <!-- PANYE -->
    <div class="page" id="pageCart">
        <div class="card">
            <div class="card-header"><h3>🛒 Panye w</h3></div>
            <div class="card-body">
                <div id="cartItems"></div>
                <p id="emptyCart" style="text-align:center;color:var(--muted);display:none">Panye vid - Ale nan Menu pou ajoute pwodui</p>
                <div id="cartSummary" style="display:none;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
                    <p style="font-size:1.2rem;font-weight:700">Total: <span id="cartTotal" style="color:var(--brand)">0 GDS</span></p>
                    <button class="btn btn-primary" style="width:100%;margin-top:1rem" onclick="showCheckout()">💳 Ale nan Peman</button>
                </div>
            </div>
        </div>
    </div>

    <!-- KÒMAND -->
    <div class="page" id="pageOrders">
        <div class="card"><div class="card-header"><h3>📦 Kòmand mwen yo</h3></div>
        <div class="card-body" id="ordersList"></div></div>
    </div>

</div>

<!-- CHECKOUT MODAL -->
<div class="modal" id="checkoutModal">
    <div class="modal-content">
        <div style="padding:1.5rem">
            <h3 style="margin-bottom:1rem">📋 Konfime Kòmand</h3>
            
            <div class="form-group"><label>Non ou *</label><input type="text" id="coName" class="form-input" required></div>
            <div class="form-group"><label>Telefòn *</label><input type="tel" id="coPhone" class="form-input" required></div>
            <div class="form-group"><label>Adrès Livrezon *</label><textarea id="coAddr" class="form-input" rows="2" required placeholder="Ri, Katye, Gonayiv"></textarea></div>
            
            <div class="form-group" style="background:rgba(255,107,53,0.05);padding:1rem;border-radius:var(--radius);border:1px solid rgba(255,107,53,0.2)">
                <label style="color:var(--brand)">📍 Lokalisasyon Obligatwa</label>
                <p style="font-size:0.8rem;color:var(--muted);margin-bottom:0.5rem">N ap itilize pozisyon w pou livrè a jwenn ou pi fasil</p>
                <button class="btn btn-outline btn-sm" onclick="getLocation()" id="locBtn"><i class="fas fa-map-marker-alt"></i> <span id="locBtnText">Aktive Lokalisasyon</span></button>
                <p id="locStatus" style="font-size:0.75rem;margin-top:0.5rem;display:none"></p>
            </div>
            
            <div style="background:rgba(255,107,53,0.05);padding:1rem;border-radius:var(--radius);margin-top:1rem;text-align:center">
                <p style="font-size:0.85rem;color:var(--muted)">💳 Peman: <strong style="color:var(--brand)">NatCash 32924776</strong></p>
                <p style="font-size:0.75rem;color:var(--muted)">Non: KòmandeM</p>
            </div>
            
            <p style="font-size:1.1rem;font-weight:700;margin:1rem 0">Total: <span id="coTotal" style="color:var(--brand)">0 GDS</span></p>
            
            <div style="display:flex;gap:0.5rem">
                <button class="btn btn-outline" style="flex:1" onclick="closeCheckout()">Anile</button>
                <button class="btn btn-primary" style="flex:1" onclick="placeOrder()" id="orderBtn">✅ Konfime</button>
            </div>
        </div>
    </div>
</div>

<div class="cart-fab" onclick="showTab('cart')">
    <i class="fas fa-shopping-bag"></i>
    <span class="cart-count" id="cartFabCount" style="display:none">0</span>
</div>

<script>
var cart=JSON.parse(localStorage.getItem('komandem-panye-temp')||'[]');
var kliyanSession=JSON.parse(localStorage.getItem('komandem-kliyan-session')||'null');
var kliyan=kliyanSession?.user||{non:'Kliyan'};
document.getElementById('kliyanName').textContent=kliyan.non||'Kliyan';

var userLocation=null;

function fm(m){return(m||0).toLocaleString('ht-HT')+' GDS'}

function showTab(tab){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
    event.target.classList.add('active');
    document.getElementById('page'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
    if(tab==='menu')loadMenu();
    if(tab==='cart')renderCart();
    if(tab==='orders')loadOrders();
}

function loadMenu(){
    var products=JSON.parse(localStorage.getItem('komandem-products')||'[]');
    var menuDuJour=JSON.parse(localStorage.getItem('komandem-menu-du-jour')||'[]');
    var available=menuDuJour.length?menuDuJour:products.filter(function(p){return p.disponib!==false});
    
    if(!available.length){document.getElementById('menuGrid').innerHTML='';document.getElementById('noMenu').style.display='block';return}
    document.getElementById('noMenu').style.display='none';
    
    document.getElementById('menuGrid').innerHTML=available.map(function(p){
        var imgHtml=p.imaj?'<img src="'+p.imaj+'" alt="'+p.non+'">':'<div>🍽️</div>';
        return'<div class="product-card" onclick="addToCart(\''+p.id+'\')"><div class="product-img">'+imgHtml+'</div><div class="product-info"><span class="badge badge-brand">'+p.kategori+'</span><h4>'+p.non+'</h4><div class="merchant">🏪 '+p.machann_non+'</div><div class="price">'+fm(p.pri)+'</div></div></div>';
    }).join('');
}

function addToCart(pid){
    var products=JSON.parse(localStorage.getItem('komandem-products')||'[]');
    var p=products.find(function(x){return x.id===pid});
    if(!p)return;
    var existing=cart.find(function(i){return i.pwodui_id===pid});
    if(existing){existing.kantite++;existing.pri_total=existing.kantite*existing.pri_inite}
    else{cart.push({pwodui_id:p.id,non:p.non,pri_inite:p.pri,kantite:1,pri_total:p.pri,machann_id:p.machann_id,machann_non:p.machann_non})}
    localStorage.setItem('komandem-panye-temp',JSON.stringify(cart));
    updateBadges();
    alert('✅ '+p.non+' ajoute!');
}

function renderCart(){
    if(!cart.length){document.getElementById('cartItems').innerHTML='';document.getElementById('emptyCart').style.display='block';document.getElementById('cartSummary').style.display='none';return}
    document.getElementById('emptyCart').style.display='none';
    document.getElementById('cartSummary').style.display='block';
    document.getElementById('cartItems').innerHTML=cart.map(function(item,idx){
        return'<div class="cart-item"><span>'+item.kantite+'x '+item.non+'</span><span>'+fm(item.pri_total)+' <button class="btn btn-danger btn-sm" onclick="removeItem('+idx+')" style="padding:0.2rem 0.5rem">✕</button></span></div>';
    }).join('');
    var total=cart.reduce(function(s,i){return s+i.pri_total},0);
    document.getElementById('cartTotal').textContent=fm(total);
}

function removeItem(idx){cart.splice(idx,1);localStorage.setItem('komandem-panye-temp',JSON.stringify(cart));renderCart();updateBadges()}

function showCheckout(){
    if(!cart.length){alert('Panye vid!');return}
    document.getElementById('coName').value=kliyan.non||'';
    document.getElementById('coPhone').value=kliyan.telefòn||'';
    document.getElementById('coAddr').value=kliyan.adrès||'';
    var total=cart.reduce(function(s,i){return s+i.pri_total},0)+Math.round(cart.reduce(function(s,i){return s+i.pri_total},0)*0.1)+25+50;
    document.getElementById('coTotal').textContent=fm(total);
    document.getElementById('checkoutModal').classList.add('show');
}

function closeCheckout(){document.getElementById('checkoutModal').classList.remove('show')}

function getLocation(){
    if(!navigator.geolocation){alert('GPS pa sipòte');return}
    document.getElementById('locBtnText').textContent='Ap chèche...';
    navigator.geolocation.getCurrentPosition(function(pos){
        userLocation={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy};
        document.getElementById('locStatus').style.display='block';
        document.getElementById('locStatus').innerHTML='<span style="color:var(--success)">✅ Lokalisasyon aktive! Presizyon: '+Math.round(pos.coords.accuracy)+'m</span>';
        document.getElementById('locBtnText').textContent='✅ Pozisyon jwenn';
    },function(){
        document.getElementById('locStatus').style.display='block';
        document.getElementById('locStatus').innerHTML='<span style="color:var(--danger)">❌ Pa ka jwenn pozisyon! Aktive GPS ou.</span>';
        document.getElementById('locBtnText').textContent='Eseye Ankò';
    },{enableHighAccuracy:true,timeout:15000});
}

function placeOrder(){
    var name=document.getElementById('coName').value.trim();
    var phone=document.getElementById('coPhone').value.trim();
    var addr=document.getElementById('coAddr').value.trim();
    
    if(!name||!phone||!addr){alert('Ranpli tout chan!');return}
    if(!userLocation){alert('📍 Ou dwe aktive lokalizasyon avan konfime!');return}
    
    var sub=cart.reduce(function(s,i){return s+i.pri_total},0);
    var tax=Math.round(sub*0.1);
    var total=sub+tax+25+50;
    
    var order={
        id:'KMD-'+Date.now().toString(36).toUpperCase(),
        kliyan:name,
        kliyan_tel:phone,
        kliyan_id:kliyan.id||'anonymous',
        atik:cart,
        sou_total:sub,tax:tax,frè_sèvis:25,frè_livrezon:50,total:total,
        estat:'ann_atent',
        adrès_livrezon:{ri:addr},
        location:userLocation,
        dat:new Date().toISOString()
    };
    
    var orders=JSON.parse(localStorage.getItem('komandem-orders')||'[]');
    orders.unshift(order);
    localStorage.setItem('komandem-orders',JSON.stringify(orders));
    localStorage.setItem('komandem-panye-temp','[]');
    cart=[];
    
    var notifs=JSON.parse(localStorage.getItem('komandem-notifications')||'[]');
    notifs.unshift({message:'🛒 Nouvo kòmand #'+order.id+' - '+fm(total),time:new Date().toISOString(),type:'machann',machann_id:order.atik[0]?.machann_id});
    localStorage.setItem('komandem-notifications',JSON.stringify(notifs));
    
    closeCheckout();updateBadges();showTab('orders');
    alert('✅ Kòmand #'+order.id+' konfime!\n\nTotal: '+fm(total)+'\nAdrès: '+addr+'\n📍 Lokalisasyon: '+userLocation.lat.toFixed(4)+', '+userLocation.lng.toFixed(4));
}

function loadOrders(){
    var orders=JSON.parse(localStorage.getItem('komandem-orders')||'[]');
    var myOrders=orders.filter(function(o){return o.kliyan_tel===kliyan.telefòn||o.kliyan_id===kliyan.id});
    var labels={ann_atent:'An Atant',konfime:'Konfime',an_preparasyon:'An Preparasyon',an_wout:'An Wout',livre:'Livre'};
    var colors={ann_atent:'badge-warning',konfime:'badge-info',an_preparasyon:'badge-info',an_wout:'badge-brand',livre:'badge-success'};
    document.getElementById('ordersList').innerHTML=myOrders.length?myOrders.map(function(o){
        return'<div class="order-card"><div style="display:flex;justify-content:space-between"><strong style="color:var(--brand)">#'+o.id+'</strong><span class="badge '+(colors[o.estat]||'badge-warning')+'">'+(labels[o.estat]||o.estat)+'</span></div><p style="color:var(--muted);font-size:0.85rem;margin-top:0.25rem">'+((o.atik||[]).map(function(a){return a.kantite+'x '+a.non}).join(', '))+'</p><p style="font-weight:600;margin-top:0.25rem">'+fm(o.total)+'</p></div>';
    }).join(''):'<p style="text-align:center;color:var(--muted);padding:2rem">Ou poko gen kòmand</p>';
}

function updateBadges(){
    var count=cart.reduce(function(s,i){return s+i.kantite},0);
    var badge=document.getElementById('cartBadge');
    var fab=document.getElementById('cartFabCount');
    badge.textContent=count;
    badge.style.display=count>0?'inline':'none';
    fab.textContent=count;
    fab.style.display=count>0?'flex':'none';
}

function logout(){localStorage.removeItem('komandem-kliyan-session');window.location.href='index.html'}

loadMenu();updateBadges();
</script>
</body>
</html>
